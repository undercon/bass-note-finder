name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-test-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BassNoteFinder/BassNoteFinder.csproj

      - name: Compute release version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $appVersion = if ($tag.StartsWith("v")) { $tag.Substring(1) } else { $tag }
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $infoVersion = "$appVersion+sha.$shortSha"
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "APP_INFO_VERSION=$infoVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build app
        run: dotnet build BassNoteFinder/BassNoteFinder.csproj --configuration Release --no-restore -p:Version=${{ env.APP_VERSION }} -p:InformationalVersion=${{ env.APP_INFO_VERSION }} -p:ContinuousIntegrationBuild=true

      - name: Publish self-contained Windows build
        shell: pwsh
        run: |
          $publishDir = "artifacts/publish/win-x64"
          dotnet publish BassNoteFinder/BassNoteFinder.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=${{ env.APP_VERSION }} `
            -p:InformationalVersion=${{ env.APP_INFO_VERSION }} `
            --output $publishDir

      - name: Publish framework-dependent Windows build
        shell: pwsh
        run: |
          $publishDir = "artifacts/publish/win-x64-framework-dependent"
          dotnet publish BassNoteFinder/BassNoteFinder.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=${{ env.APP_VERSION }} `
            -p:InformationalVersion=${{ env.APP_INFO_VERSION }} `
            --output $publishDir

      - name: Include end-user README in packages
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "RELEASE_README.md" -Destination "artifacts/publish/win-x64/README.md" -Force
          Copy-Item -LiteralPath "RELEASE_README.md" -Destination "artifacts/publish/win-x64-framework-dependent/README.md" -Force
          @"
          This build is framework-dependent.
          Requires Microsoft .NET Desktop Runtime 10.x (x64) on Windows 10/11.
          "@ | Set-Content -LiteralPath "artifacts/publish/win-x64-framework-dependent/RUNTIME_REQUIRED.txt"

      - name: Package release artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $selfContainedZipName = "BassNoteFinder-$tag-win-x64.zip"
          $frameworkDependentZipName = "BassNoteFinder-$tag-win-x64-framework-dependent.zip"
          $selfContainedZipPath = "artifacts/$selfContainedZipName"
          $frameworkDependentZipPath = "artifacts/$frameworkDependentZipName"

          if (Test-Path -LiteralPath $selfContainedZipPath) {
            Remove-Item -LiteralPath $selfContainedZipPath -Force
          }

          if (Test-Path -LiteralPath $frameworkDependentZipPath) {
            Remove-Item -LiteralPath $frameworkDependentZipPath -Force
          }

          Compress-Archive -Path "artifacts/publish/win-x64/*" -DestinationPath $selfContainedZipPath
          Compress-Archive -Path "artifacts/publish/win-x64-framework-dependent/*" -DestinationPath $frameworkDependentZipPath

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bass Note Finder ${{ github.ref_name }}
          body: |
            Automated release for tag ${{ github.ref_name }}.
            Build version: ${{ env.APP_VERSION }}

            Included artifacts:
            - self-contained `win-x64` package (no .NET install required)
            - framework-dependent `win-x64-framework-dependent` package (requires .NET Desktop Runtime 10.x x64)
          files: |
            artifacts/BassNoteFinder-${{ github.ref_name }}-win-x64.zip
            artifacts/BassNoteFinder-${{ github.ref_name }}-win-x64-framework-dependent.zip
