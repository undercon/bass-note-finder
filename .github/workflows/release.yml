name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-test-and-release:
    runs-on: windows-latest
    env:
      VERSION_PREFIX: 0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BassNoteFinder/BassNoteFinder.csproj

      - name: Compute release version
        shell: pwsh
        run: |
          $appVersion = "$env:VERSION_PREFIX.$env:GITHUB_RUN_NUMBER"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $infoVersion = "$appVersion+sha.$shortSha"
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "APP_INFO_VERSION=$infoVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build app
        run: dotnet build BassNoteFinder/BassNoteFinder.csproj --configuration Release --no-restore -p:Version=${{ env.APP_VERSION }} -p:InformationalVersion=${{ env.APP_INFO_VERSION }} -p:ContinuousIntegrationBuild=true

      - name: Publish self-contained Windows build
        shell: pwsh
        run: |
          $publishDir = "artifacts/publish/win-x64"
          dotnet publish BassNoteFinder/BassNoteFinder.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=${{ env.APP_VERSION }} `
            -p:InformationalVersion=${{ env.APP_INFO_VERSION }} `
            --output $publishDir

      - name: Include end-user README in package
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "RELEASE_README.md" -Destination "artifacts/publish/win-x64/README.md" -Force

      - name: Package release artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "BassNoteFinder-$tag-win-x64.zip"
          $zipPath = "artifacts/$zipName"

          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path "artifacts/publish/win-x64/*" -DestinationPath $zipPath

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bass Note Finder ${{ github.ref_name }}
          body: |
            Automated release for tag ${{ github.ref_name }}.
            Build version: ${{ env.APP_VERSION }}

            This package is self-contained for Windows x64 and does not require .NET to be installed.
          files: artifacts/BassNoteFinder-${{ github.ref_name }}-win-x64.zip
